# ============================================================
# Docker Compose — Sowel Cloud App (Microservice Architecture)
# Komputasi Awan — SI ITK
# ============================================================
# Usage:
#   docker compose up -d          # Start semua services di background
#   docker compose down            # Menghentikan & menghapus container
#   docker compose logs -f         # Melihat log secara realtime
#   docker compose ps              # Melihat status service
# ============================================================
#
# Arsitektur Microservice:
#   ┌─────────┐     ┌──────────────┐     ┌──────────────┐
#   │ Frontend │────>│   Gateway    │────>│ Auth Service  │
#   │ (React)  │     │   (Nginx)    │────>│ Task Service  │
#   └─────────┘     └──────────────┘     └──────────────┘
#                                              │
#                                         ┌────┴────┐
#                                         │   DB    │
#                                         │(Postgres)│
#                                         └─────────┘
# ============================================================

services:
  # ==================== DATABASE ====================
  db:
    image: postgres:16-alpine                                       # Menggunakan image PostgreSQL ringan (alpine)
    container_name: sowel-db
    restart: unless-stopped                                         # Restart otomatis kecuali dihentikan manual
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}                     # Username database
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cloudapp}                         # Database default
    ports:
      - "5433:5432"                                                 # Map port lokal 5433 → port PostgreSQL 5432 di container
    volumes:
      - pgdata:/var/lib/postgresql/data                             # Menyimpan data agar tidak hilang (data persistence)
      - ./services/db/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh  # Script untuk membuat db auth_db & task_db
    networks:
      - cloudnet                                                    # Menghubungkan ke network internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cloudapp}"]  # Cek apakah DB siap menerima koneksi
      interval: 10s                                                 # Interval pengecekan
      timeout: 5s                                                   # Batas waktu tiap pengecekan
      retries: 5                                                    # Jumlah percobaan sebelum dianggap gagal
      start_period: 10s                                             # Waktu tunggu sebelum mulai healthcheck

  # ==================== AUTH SERVICE ====================
  auth-service:
    build:
      context: ./services/auth-service                              # Lokasi source code auth-service
      dockerfile: Dockerfile
    container_name: sowel-auth-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL:?Set AUTH_DATABASE_URL in .env}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost,http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"                                                 # Expose auth-service ke localhost:8001
    networks:
      - cloudnet
    depends_on:
      db:
        condition: service_healthy                                  # Auth-service hanya start jika database sudah siap
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==================== TASK SERVICE ====================
  task-service:
    build:
      context: ./services/task-service                              # Lokasi source code task-service
      dockerfile: Dockerfile
    container_name: sowel-task-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${TASK_DATABASE_URL:?Set TASK_DATABASE_URL in .env}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8001}  # URL auth-service untuk verifikasi token
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}              # Harus sama dengan auth-service agar JWT valid
      ALGORITHM: ${ALGORITHM:-HS256}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost,http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8002:8002"                                                 # Expose task-service ke localhost:8002
    networks:
      - cloudnet
    depends_on:
      db:
        condition: service_healthy                                  # Task-service hanya start jika database sudah siap
      auth-service:
        condition: service_healthy                                  # Task-service butuh auth-service untuk verifikasi token
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend                                           # Lokasi source code frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost}             # Frontend mengakses API via gateway (port 80)
    container_name: sowel-frontend
    restart: unless-stopped
    networks:
      - cloudnet
    depends_on:
      - auth-service                                                # Frontend dijalankan setelah backend services
      - task-service

  # ==================== API GATEWAY ====================
  gateway:
    image: nginx:alpine
    container_name: sowel-gateway
    restart: unless-stopped
    ports:
      - "80:80"                                                     # Gateway diakses di localhost:80
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # Konfigurasi routing
    networks:
      - cloudnet
    depends_on:
      - auth-service
      - task-service
      - frontend

# ==================== VOLUMES ====================
volumes:
  pgdata:
    name: sowel-pgdata                                              # Volume untuk menyimpan data PostgreSQL

# ==================== NETWORKS ====================
networks:
  cloudnet:
    name: sowel-network                                             # Nama network antar container
    driver: bridge                                                  # Menggunakan bridge network (default Docker)
