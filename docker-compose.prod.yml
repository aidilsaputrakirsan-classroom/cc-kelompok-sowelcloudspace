# ============================================================
# Docker Compose — Production Environment
# Komputasi Awan — SI ITK
# ============================================================
# Production overrides untuk docker-compose.yml
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ==================== DATABASE ====================
  db:
    # No port exposure in production
    ports: !reset []
    # Add resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    # Production restart policy
    restart: always
    environment:
      # Override dengan production password
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      SERVICE_NAME: database
      ENVIRONMENT: production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=database,environment=production"

  # ==================== BACKEND ====================
  backend:
    # No port exposure - only internal communication
    ports: !reset []
    # Add resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    # Production restart policy
    restart: always
    # Override environment dengan production settings
    environment:
      LOG_LEVEL: WARNING
      SERVICE_NAME: backend-api
      ENVIRONMENT: production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=backend,environment=production"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==================== FRONTEND ====================
  frontend:
    # Nginx port exposed (gateway to world)
    ports: !override
      - "80:80"
    # Add resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    # Production restart policy
    restart: always
    environment:
      ENVIRONMENT: production
      SERVICE_NAME: frontend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=frontend,environment=production"
