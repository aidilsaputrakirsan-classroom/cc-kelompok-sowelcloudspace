# ============================================================
# API Gateway — Nginx Reverse Proxy
# Meneruskan request dari frontend ke microservices
#
# Routing:
#   /auth/*         → auth-service:8001
#   /tasks/*        → task-service:8002
#   /api/folders    → task-service:8002 (Manajemen Folder)
#   /users/verify   → auth-service:8001 (Verifikasi member group)
#   /health         → auth-service (default health check)
#   /team           → auth-service (info endpoint)
#   /*              → frontend (React SPA)
# ============================================================

upstream auth_backend {
    server auth-service:8001;
}

upstream task_backend {
    server task-service:8002;
}

upstream frontend_app {
    server frontend:80;
}

# Rate limiting zones.
# Auth dibuat lebih ketat untuk menahan brute-force login/register.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # ==================== AUTH SERVICE ====================
    # Login/register memakai limit paling ketat.
    location = /auth/login {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://auth_backend/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location = /auth/register {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://auth_backend/auth/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Semua request /auth/* diteruskan ke auth-service
    location /auth/ {
        limit_req zone=general_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://auth_backend/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ==================== USER VERIFY ====================
    # Verifikasi username untuk tambah member ke folder
    location /users/verify {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://auth_backend/users/verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ==================== TASK SERVICE ====================
    # Semua request /tasks/* diteruskan ke task-service
    location /tasks {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://task_backend/tasks;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ==================== FOLDER SERVICE ====================
    # Manajemen Folder yang terintegrasi di task-service
    location /api/folders {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://task_backend/api/folders;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ==================== HEALTH CHECK ====================
    # Health endpoint umum
    location = /health {
        proxy_pass http://auth_backend/health;
        proxy_set_header Host $host;
    }

    # ==================== TEAM INFO ====================
    location = /team {
        # Return team info langsung di gateway
        default_type application/json;
        return 200 '{"team":"cloud-team-sowelcloudspace","members":[{"name":"Anjas Geofany Diamare","nim":"10231016","role":"Lead Backend"},{"name":"Cantika Ade Qutnindra Maharani","nim":"10231024","role":"Lead Frontend"},{"name":"Arya Wijaya Saroyo","nim":"10231020","role":"Lead DevOps"},{"name":"Meiske Handayani","nim":"10231052","role":"Lead QA & Docs"}]}';
    }

    # ==================== ROOT API ====================
    location = /api {
        default_type application/json;
        return 200 '{"message":"Sowel Task API running (microservice mode)"}';
    }

    # ==================== FRONTEND ====================
    # Semua request lain diteruskan ke frontend (React SPA)
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # JSON response untuk request yang terkena rate limit.
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"error":"Too many requests. Please try again later."}';
    }
}
