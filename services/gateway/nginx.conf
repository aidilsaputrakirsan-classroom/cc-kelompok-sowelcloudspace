# ============================================================
# API Gateway — Nginx Reverse Proxy
# Meneruskan request dari frontend ke microservices
#
# Routing:
#   /auth/*   → auth-service:8001
#   /tasks/*  → task-service:8002
#   /health   → auth-service (default health check)
#   /team     → auth-service (info endpoint)
#   /*        → frontend (React SPA)
# ============================================================

upstream auth_backend {
    server auth-service:8001;
}

upstream task_backend {
    server task-service:8002;
}

upstream frontend_app {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # ==================== AUTH SERVICE ====================
    # Semua request /auth/* diteruskan ke auth-service
    location /auth/ {
        proxy_pass http://auth_backend/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== TASK SERVICE ====================
    # Semua request /tasks/* diteruskan ke task-service
    location /tasks {
        proxy_pass http://task_backend/tasks;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== HEALTH CHECK ====================
    # Health endpoint umum — cek kedua service
    location = /health {
        proxy_pass http://auth_backend/health;
        proxy_set_header Host $host;
    }

    # ==================== TEAM INFO ====================
    location = /team {
        # Return team info langsung di gateway
        default_type application/json;
        return 200 '{"team":"cloud-team-sowelcloudspace","members":[{"name":"Anjas Geofany Diamare","nim":"10231016","role":"Lead Backend"},{"name":"Cantika Ade Qutnindra Maharani","nim":"10231024","role":"Lead Frontend"},{"name":"Arya Wijaya Saroyo","nim":"10231020","role":"Lead DevOps"},{"name":"Meiske Handayani","nim":"10231052","role":"Lead QA & Docs"}]}';
    }

    # ==================== ROOT API ====================
    location = /api {
        default_type application/json;
        return 200 '{"message":"Sowel Task API running (microservice mode)"}';
    }

    # ==================== FRONTEND ====================
    # Semua request lain diteruskan ke frontend (React SPA)
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
