# ============================================================
# Docker Compose Override - Development Mode
# Digunakan untuk hot-reload microservice lokal
# ============================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# ============================================================

services:
  # ==================== AUTH SERVICE (HOT-RELOAD) ====================
  auth-service:
    volumes:
      - ./services/auth-service:/app
      - /app/__pycache__
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8001
      --reload
      --reload-dirs /app
    environment:
      ENVIRONMENT: development
      DEBUG: "true"

  # ==================== TASK SERVICE (HOT-RELOAD) ====================
  task-service:
    volumes:
      - ./services/task-service:/app
      - /app/__pycache__
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8002
      --reload
      --reload-dirs /app
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ALGORITHM: ${ALGORITHM:-HS256}

  # ==================== FRONTEND (HOT-RELOAD) ====================
  frontend:
    image: sowel-frontend-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/package.json:/app/package.json
      - ./frontend/eslint.config.js:/app/eslint.config.js
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"

  # ==================== API GATEWAY (DEV PORT) ====================
  gateway:
    ports: !override
      - "8080:80"
